version: 2
updates:
  - package-ecosystem: "nix"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "daily"
      time: "02:00"
      timezone: "Asia/Shanghai"
    assignees:
      - "tiramission"
    open-pull-requests-limit: 1
    groups:
      all-nix:
        patterns:
          - "**"
