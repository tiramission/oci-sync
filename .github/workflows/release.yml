name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Build Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -o oci-sync-linux-amd64 .

      - name: Build Linux arm64
        run: |
          GOOS=linux GOARCH=arm64 go build -o oci-sync-linux-arm64 .

      - name: Build macOS amd64
        run: |
          GOOS=darwin GOARCH=amd64 go build -o oci-sync-darwin-amd64 .

      - name: Build macOS arm64
        run: |
          GOOS=darwin GOARCH=arm64 go build -o oci-sync-darwin-arm64 .

      - name: Build Windows amd64
        run: |
          GOOS=windows GOARCH=amd64 go build -o oci-sync-windows-amd64.exe .

      - name: Determine if prerelease
        id: prerelease
        run: |
          TAG=${GITHUB_REF##*/}
          if [[ $TAG =~ -alpha|-beta|-rc ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            oci-sync-linux-amd64
            oci-sync-linux-arm64
            oci-sync-darwin-amd64
            oci-sync-darwin-arm64
            oci-sync-windows-amd64.exe
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
