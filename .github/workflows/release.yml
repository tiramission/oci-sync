name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Determine version
        id: version
        run: |
          TAG=${GITHUB_REF##*/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          TAG=${{ steps.version.outputs.version }}
          for OS in linux darwin windows; do
            for ARCH in amd64 arm64; do
              EXT=""
              if [ "$OS" = "windows" ]; then EXT=".exe"; fi
              OUTPUT="oci-sync-${OS}-${ARCH}${EXT}"
              GOOS=$OS GOARCH=$ARCH go build -ldflags "-X github.com/tiramission/oci-sync/internal/version.Version=${TAG}" -o "$OUTPUT" .
            done
          done

      - name: Determine if prerelease
        id: prerelease
        run: |
          TAG=${GITHUB_REF##*/}
          if [[ $TAG =~ -alpha|-beta|-rc ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            oci-sync-linux-amd64
            oci-sync-linux-arm64
            oci-sync-darwin-amd64
            oci-sync-darwin-arm64
            oci-sync-windows-amd64.exe
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
